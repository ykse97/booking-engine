<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hero Poster Capture</title>
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        body {
            display: grid;
            place-items: center;
        }

        video {
            width: 1280px;
            height: 720px;
            object-fit: cover;
            background: #000;
        }
    </style>
</head>
<body>
    <video id="capture-video" src="http://localhost:4173/hero-bg.mp4" muted playsinline preload="auto"></video>
    <script>
        const video = document.getElementById('capture-video');
        const markReady = () => {
            document.body.dataset.ready = 'true';
        };

        async function prepareFrame() {
            try {
                await video.play();
            } catch {
                // Ignore autoplay restrictions in headless capture.
            }

            const seekTarget = 0.12;

            if (video.readyState >= 2) {
                video.pause();

                try {
                    video.currentTime = seekTarget;
                } catch {
                    markReady();
                }
            }
        }

        video.addEventListener('loadeddata', prepareFrame, { once: true });
        video.addEventListener('seeked', () => {
            video.pause();
            markReady();
        }, { once: true });

        window.setTimeout(markReady, 5000);
    </script>
</body>
</html>
