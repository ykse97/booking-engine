# Copy values from this file into environment variables, .env.local, or your
# deployment platform secret manager. Do not commit real secrets.

# Database
SPRING_DATASOURCE_URL=<postgres-jdbc-url>
SPRING_DATASOURCE_USERNAME=<database-username>
SPRING_DATASOURCE_PASSWORD=<database-password>

# Browser origin allowlist
APP_CORS_ALLOWED_ORIGINS=https://your-frontend-host.example

# Stripe
APP_STRIPE_SECRET_KEY=<stripe-secret-key>
APP_STRIPE_WEBHOOK_SECRET=<stripe-webhook-secret>
APP_STRIPE_PUBLISHABLE_KEY=<stripe-publishable-key>
APP_STRIPE_CURRENCY=eur
APP_STRIPE_WEBHOOK_MAX_PAYLOAD_BYTES=1048576
APP_STRIPE_WEBHOOK_INVALID_RATE_LIMIT_MAX_ATTEMPTS=20
APP_STRIPE_WEBHOOK_INVALID_RATE_LIMIT_WINDOW_SECONDS=60
APP_STRIPE_WEBHOOK_INVALID_RATE_LIMIT_CLEANUP_INTERVAL_SECONDS=300

# Public booking hold abuse protection
APP_BOOKING_HOLD_LIMITS_MAX_ACTIVE_PER_SLOT=1
APP_BOOKING_PUBLIC_HOLD_RATE_LIMIT_IP_MAX_ATTEMPTS=12
APP_BOOKING_PUBLIC_HOLD_RATE_LIMIT_IP_WINDOW_SECONDS=60
APP_BOOKING_PUBLIC_HOLD_RATE_LIMIT_DEVICE_MAX_ATTEMPTS=8
APP_BOOKING_PUBLIC_HOLD_RATE_LIMIT_DEVICE_WINDOW_SECONDS=60
APP_BOOKING_PUBLIC_HOLD_RATE_LIMIT_CLEANUP_INTERVAL_SECONDS=300
APP_BOOKING_PUBLIC_ACTION_RATE_LIMIT_IP_MAX_ATTEMPTS=60
APP_BOOKING_PUBLIC_ACTION_RATE_LIMIT_IP_WINDOW_SECONDS=60
APP_BOOKING_PUBLIC_ACTION_RATE_LIMIT_TARGET_MAX_ATTEMPTS=20
APP_BOOKING_PUBLIC_ACTION_RATE_LIMIT_TARGET_WINDOW_SECONDS=60
APP_BOOKING_PUBLIC_ACTION_RATE_LIMIT_DEVICE_MAX_ATTEMPTS=30
APP_BOOKING_PUBLIC_ACTION_RATE_LIMIT_DEVICE_WINDOW_SECONDS=60
APP_BOOKING_PUBLIC_ACTION_RATE_LIMIT_CLEANUP_INTERVAL_SECONDS=300

# JWT
APP_JWT_SECRET=<generate-a-long-random-secret>
APP_JWT_EXPIRATION_SECONDS=1800
APP_JWT_ISSUER=salon-booking-platform
# Admin login hardening
APP_AUTH_MAX_FAILED_ATTEMPTS=5
APP_AUTH_LOCK_DURATION_SECONDS=900
APP_AUTH_RATE_LIMIT_IP_MAX_ATTEMPTS=20
APP_AUTH_RATE_LIMIT_IP_WINDOW_SECONDS=60
APP_AUTH_RATE_LIMIT_USERNAME_IP_MAX_ATTEMPTS=10
APP_AUTH_RATE_LIMIT_USERNAME_IP_WINDOW_SECONDS=60
APP_AUTH_RATE_LIMIT_CLEANUP_INTERVAL_SECONDS=300

# Admin bootstrap - set only for first bootstrap or controlled rotation.
APP_ADMIN_BOOTSTRAP_ENABLED=false
APP_ADMIN_BOOTSTRAP_USERNAME=<admin-username>
APP_ADMIN_BOOTSTRAP_PASSWORD=<admin-password>
APP_ADMIN_BOOTSTRAP_ALLOW_PASSWORD_OVERWRITE=false

# Admin auth cookie
APP_AUTH_COOKIE_SECURE=true
APP_AUTH_COOKIE_SAME_SITE=None
